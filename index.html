<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Lojas Kyshess</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primaria: #000000;
            --cinza-fundo: #f9f9f9;
            --borda: #eee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: #fff; color: #333; }

        /* Estilo Kyshess */
        .top-bar { background: var(--primaria); color: white; font-size: 10px; text-align: center; padding: 10px; text-transform: uppercase; letter-spacing: 2px; }
        header { padding: 20px; text-align: center; border-bottom: 1px solid var(--borda); position: sticky; top: 0; background: white; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 6px; font-size: 1.5rem; text-decoration: none; color: #000; }

        /* Busca */
        .search-container { padding: 30px 20px; background: var(--cinza-fundo); text-align: center; }
        .search-wrapper { position: relative; max-width: 500px; margin: 0 auto; }
        .search-wrapper input { width: 100%; padding: 15px; border: 1px solid #ccc; outline: none; border-radius: 0; font-size: 16px; /* Evita zoom no iPhone */ }
        
        /* Lista de Lojas */
        .store-list { padding: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .store-card { border: 1px solid var(--borda); padding: 25px; transition: 0.3s; background: #fff; }
        .store-card:hover { border-color: #000; }
        .store-card h3 { text-transform: uppercase; font-size: 1.2rem; margin-bottom: 10px; letter-spacing: 1px; }
        .store-card p { font-size: 0.9rem; color: #666; margin-bottom: 5px; line-height: 1.4; }
        .store-card i { color: #000; margin-right: 8px; width: 15px; }

        /* Botões */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { text-decoration: none; text-align: center; padding: 12px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; border: 1px solid #000; transition: 0.3s; }
        .btn-map { background: #000; color: #fff; }
        .btn-whats { background: #fff; color: #000; }

        #status { text-align: center; padding: 40px; color: #999; text-transform: uppercase; font-size: 12px; }

        @media (min-width: 768px) {
            .store-list { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

    <div class="top-bar">Lojas Oficiais Kyshess</div>
    
    <header>
        <a href="https://www.kyshess.com.br/" class="logo">KYSHESS</a>
    </header>

    <section class="search-container">
        <div class="search-wrapper">
            <input type="text" id="searchInput" placeholder="DIGITE SUA CIDADE OU BAIRRO" onkeyup="filterStores()">
        </div>
    </section>

    <div id="status">Carregando lojas...</div>

    <main class="store-list" id="storeContainer"></main>

    <script>
        // URL da sua planilha convertida para CSV
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRIsedeASIcLcVVNodkzRtGtCeLlFadm-KFjfu7RIC04qVxy6ZpfK6zIwqiiD8__UNqvSGgAycrsdok/pub?output=csv';

        async function loadStores() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                
                // Função simples para lidar com CSV (ignora vírgulas dentro de aspas)
                const rows = data.split(/\r?\n/).slice(1); 
                const container = document.getElementById('storeContainer');
                const status = document.getElementById('status');

                if (rows.length === 0) {
                    status.innerText = "Nenhuma loja encontrada.";
                    return;
                }

                status.style.display = 'none';
                container.innerHTML = '';

                rows.forEach(row => {
                    // Regex para separar colunas respeitando aspas (caso haja vírgula no endereço)
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (cols.length >= 2) {
                        const nome = cols[0] ? cols[0].replace(/"/g, "") : "#";
                        const endereco = cols[1] ? cols[1].replace(/"/g, "") : "#";
                        const linkWhats = cols[4] ? cols[4].replace(/"/g, "") : "#";
                        const linkMapa = cols[3] ? cols[3].replace(/"/g, "") : "#";

                        const card = document.createElement('div');
                        card.className = 'store-card';
                        card.setAttribute('data-search', (nome + endereco).toLowerCase());
                        
                        card.innerHTML = `
                            <h3>${nome}</h3>
                            <p><i class="fa-solid fa-location-dot"></i> ${endereco}</p>
                            <div class="actions">
                                <a href="${linkMapa}" target="_blank" class="btn btn-map">COMO CHEGAR</a>
                                <a href="${linkWhats}" target="_blank" class="btn btn-whats">WHATSAPP</a>
                            </div>
                        `;
                        container.appendChild(card);
                    }
                });
            } catch (error) {
                console.error("Erro ao carregar dados:", error);
                document.getElementById('status').innerText = "Erro ao carregar lojas.";
            }
        }

        function filterStores() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.store-card');
            
            cards.forEach(card => {
                const text = card.getAttribute('data-search');
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        }

        window.onload = loadStores;
    </script>
</body>
</html>
